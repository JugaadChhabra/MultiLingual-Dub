<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>STT -> Translate -> TTS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f7f4ef;
        --ink: #1a1a1a;
        --accent: #0c6b5f;
        --muted: #6b6b6b;
      }

      body {
        margin: 0;
        font-family: "Poppins", "Helvetica Neue", Arial, sans-serif;
        background: radial-gradient(circle at 20% 10%, #f3eee6, #f7f4ef);
        color: var(--ink);
      }

      .wrap {
        max-width: 760px;
        margin: 40px auto;
        padding: 24px;
        background: #fffdf8;
        border: 1px solid #eee3d6;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: 0.4px;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
      }

      label {
        display: block;
        margin: 14px 0 6px;
        font-weight: 600;
      }

      input[type="file"],
      input[type="text"] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ddd3c7;
        background: #fff;
        font-size: 15px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .actions {
        margin-top: 18px;
        display: flex;
        gap: 12px;
        align-items: center;
      }

      button {
        border: none;
        background: var(--accent);
        color: #fff;
        padding: 12px 18px;
        font-size: 15px;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .status {
        margin-top: 16px;
        font-size: 14px;
      }

      .error {
        color: #a12a2a;
      }

      .result {
        margin-top: 18px;
        background: #faf6ef;
        border: 1px dashed #e2d7c9;
        padding: 12px;
        white-space: pre-wrap;
        font-size: 14px;
      }

      .player {
        margin-top: 16px;
        padding: 12px;
        border: 1px solid #e2d7c9;
        background: #fffaf2;
      }

      @media (max-width: 720px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Upload MP3 for Translation + TTS</h1>
      <p>Select an mp3, choose a target language, and run the pipeline.</p>

      <form id="uploadForm">
        <label for="audio">MP3 File</label>
        <input id="audio" name="audio" type="file" accept="audio/mpeg,.mp3" required />
        <div class="status" id="fileStatus"></div>

        <div class="row">
          <div>
            <label for="target_language">Target Language</label>
            <select id="target_language" name="target_language">
              <option value="bn-IN">Bengali</option>
              <option value="en-IN">English</option>
              <option value="gu-IN">Gujarati</option>
              <option value="hi-IN" selected>Hindi</option>
              <option value="kn-IN">Kannada</option>
              <option value="ml-IN">Malayalam</option>
              <option value="mr-IN">Marathi</option>
              <option value="od-IN">Odia</option>
              <option value="pa-IN">Punjabi</option>
              <option value="ta-IN">Tamil</option>
              <option value="te-IN">Telugu</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button id="submitBtn" type="submit">Run</button>
          <span class="status" id="submitStatus"></span>
        </div>
      </form>

      <div class="result" id="result" hidden></div>
      <div class="player" id="player" hidden>
        <label>Audio Output</label>
        <audio id="audioPlayer" controls preload="none"></audio>
      </div>
    </div>

    <script>
      const form = document.getElementById("uploadForm");
      const audioInput = document.getElementById("audio");
      const fileStatus = document.getElementById("fileStatus");
      const submitStatus = document.getElementById("submitStatus");
      const result = document.getElementById("result");
      const player = document.getElementById("player");
      const audioPlayer = document.getElementById("audioPlayer");
      const submitBtn = document.getElementById("submitBtn");

      function setStatus(el, message, isError = false) {
        el.textContent = message;
        el.className = "status" + (isError ? " error" : "");
      }

      audioInput.addEventListener("change", () => {
        const file = audioInput.files[0];
        result.hidden = true;

        if (!file) {
          setStatus(fileStatus, "");
          return;
        }

        if (!file.name.toLowerCase().endsWith(".mp3")) {
          setStatus(fileStatus, "Only .mp3 files are allowed.", true);
          audioInput.value = "";
          return;
        }

        const sizeMb = (file.size / (1024 * 1024)).toFixed(2);
        setStatus(fileStatus, `Selected: ${file.name} (${sizeMb} MB)`);
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const file = audioInput.files[0];
        if (!file) {
          setStatus(fileStatus, "Please select an mp3 file.", true);
          return;
        }

        if (!file.name.toLowerCase().endsWith(".mp3")) {
          setStatus(fileStatus, "Only .mp3 files are allowed.", true);
          return;
        }

        const formData = new FormData(form);

        submitBtn.disabled = true;
        setStatus(submitStatus, "Processing...");
        result.hidden = true;
        player.hidden = true;
        audioPlayer.removeAttribute("src");

        try {
          const response = await fetch("/stt", {
            method: "POST",
            body: formData,
          });

          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.detail || "Request failed");
          }

          result.textContent = JSON.stringify(payload, null, 2);
          result.hidden = false;

          if (payload.tts_url) {
            audioPlayer.src = payload.tts_url;
            player.hidden = false;
          }
          setStatus(submitStatus, "Done.");
        } catch (error) {
          setStatus(submitStatus, error.message || "Request failed", true);
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
