<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>STT -> Translate -> TTS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f7f4ef;
        --ink: #1a1a1a;
        --accent: #0c6b5f;
        --muted: #6b6b6b;
      }

      body {
        margin: 0;
        font-family: "Poppins", "Helvetica Neue", Arial, sans-serif;
        background: radial-gradient(circle at 20% 10%, #f3eee6, #f7f4ef);
        color: var(--ink);
      }

      .wrap {
        max-width: 760px;
        margin: 40px auto;
        padding: 24px;
        background: #fffdf8;
        border: 1px solid #eee3d6;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: 0.4px;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
      }

      label {
        display: block;
        margin: 14px 0 6px;
        font-weight: 600;
      }

      input[type="file"],
      input[type="text"] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ddd3c7;
        background: #fff;
        font-size: 15px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .actions {
        margin-top: 18px;
        display: flex;
        gap: 12px;
        align-items: center;
      }

      button {
        border: none;
        background: var(--accent);
        color: #fff;
        padding: 12px 18px;
        font-size: 15px;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .status {
        margin-top: 16px;
        font-size: 14px;
      }

      .error {
        color: #a12a2a;
      }

      .result {
        margin-top: 18px;
        background: #faf6ef;
        border: 1px dashed #e2d7c9;
        padding: 12px;
        white-space: pre-wrap;
        font-size: 14px;
      }

      .player {
        margin-top: 16px;
        padding: 12px;
        border: 1px solid #e2d7c9;
        background: #fffaf2;
      }

      @media (max-width: 720px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Upload MP3</h1>
      <p>Select an mp3, choose a target language, and run the pipeline.</p>

      <form id="uploadForm">
        <label>Input Type</label>
        <div class="row">
          <div>
            <input type="radio" id="inputAudio" name="inputType" value="audio" checked />
            <label for="inputAudio" style="display:inline;font-weight:400;">Upload MP3</label>
          </div>
          <div>
            <input type="radio" id="inputText" name="inputType" value="text" />
            <label for="inputText" style="display:inline;font-weight:400;">Paste Text</label>
          </div>
        </div>

        <div id="audioInputSection">
          <label for="audio">MP3 File</label>
          <input id="audio" name="audio" type="file" accept="audio/mpeg,.mp3" />
          <div class="status" id="fileStatus"></div>
        </div>

        <div id="textInputSection" style="display:none;">
          <label for="textInput">Text Input</label>
          <textarea id="textInput" name="textInput" rows="4" style="width:100%;padding:10px 12px;font-size:15px;"></textarea>
        </div>

        <div class="row">
          <div>
            <label>Target Languages</label>
            <div id="languageCheckboxes" style="display: flex; flex-wrap: wrap; gap: 10px 24px;">
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="bn-IN"> Bengali
              </label>
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="en-IN"> English
              </label>
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="gu-IN"> Gujarati
              </label>
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="hi-IN" checked> Hindi
              </label>
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="kn-IN"> Kannada
              </label>
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="ml-IN"> Malayalam
              </label>
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="mr-IN"> Marathi
              </label>
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="od-IN"> Odia
              </label>
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="pa-IN"> Punjabi
              </label>
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="ta-IN"> Tamil
              </label>
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="te-IN"> Telugu
              </label>
            </div>
          </div>
        </div>

        <div class="actions">
          <button id="submitBtn" type="submit">Run</button>
          <span class="status" id="submitStatus"></span>
        </div>
      </form>

      <div class="result" id="result" hidden></div>
      <div id="multiResults"></div>
    </div>

    <script>
      const form = document.getElementById("uploadForm");
      const audioInput = document.getElementById("audio");
      const fileStatus = document.getElementById("fileStatus");
      const submitStatus = document.getElementById("submitStatus");
      const result = document.getElementById("result");
      const player = document.getElementById("player");
      const audioPlayer = document.getElementById("audioPlayer");
      const submitBtn = document.getElementById("submitBtn");
      const inputAudioRadio = document.getElementById("inputAudio");
      const inputTextRadio = document.getElementById("inputText");
      const audioInputSection = document.getElementById("audioInputSection");
      const textInputSection = document.getElementById("textInputSection");
      const textInput = document.getElementById("textInput");

      function setStatus(el, message, isError = false) {
        el.textContent = message;
        el.className = "status" + (isError ? " error" : "");
      }

      // Toggle input sections
      inputAudioRadio.addEventListener("change", () => {
        if (inputAudioRadio.checked) {
          audioInputSection.style.display = "block";
          textInputSection.style.display = "none";
        }
      });
      inputTextRadio.addEventListener("change", () => {
        if (inputTextRadio.checked) {
          audioInputSection.style.display = "none";
          textInputSection.style.display = "block";
        }
      });

      audioInput.addEventListener("change", () => {
        const file = audioInput.files[0];
        result.hidden = true;
        if (!file) {
          setStatus(fileStatus, "");
          return;
        }
        if (!file.name.toLowerCase().endsWith(".mp3")) {
          setStatus(fileStatus, "Only .mp3 files are allowed.", true);
          audioInput.value = "";
          return;
        }
        const sizeMb = (file.size / (1024 * 1024)).toFixed(2);
        setStatus(fileStatus, `Selected: ${file.name} (${sizeMb} MB)`);
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        // Get selected languages from checkboxes
        const selectedLanguages = Array.from(document.querySelectorAll('input[name="target_language"]:checked')).map(cb => cb.value);
        if (selectedLanguages.length === 0) {
          setStatus(submitStatus, "Please select at least one target language.", true);
          return;
        }

        // Determine input type
        const isAudio = inputAudioRadio.checked;
        const isText = inputTextRadio.checked;

        submitBtn.disabled = true;
        setStatus(submitStatus, "Processing...");
        result.hidden = true;
        if (typeof player !== 'undefined' && player) player.hidden = true;
        if (typeof audioPlayer !== 'undefined' && audioPlayer) audioPlayer.removeAttribute("src");
        result.textContent = "";
        const multiResultsDiv = document.getElementById("multiResults");
        if (multiResultsDiv) multiResultsDiv.innerHTML = "";

        let results = [];

        try {
          if (isAudio) {
            const file = audioInput.files[0];
            if (!file) {
              setStatus(fileStatus, "Please select an mp3 file.", true);
              submitBtn.disabled = false;
              return;
            }
            if (!file.name.toLowerCase().endsWith(".mp3")) {
              setStatus(fileStatus, "Only .mp3 files are allowed.", true);
              submitBtn.disabled = false;
              return;
            }
            // For each language, send the file to /stt with the language
            for (const lang of selectedLanguages) {
              const formData = new FormData();
              formData.append("audio", file);
              formData.append("target_language", lang);
              const response = await fetch("/stt", {
                method: "POST",
                body: formData,
              });
              if (!response.ok) {
                let errorMessage = `Request failed for ${lang}`;
                try {
                  const payload = await response.json();
                  errorMessage = payload.detail || errorMessage;
                } catch (e) {
                  errorMessage = response.statusText || errorMessage;
                }
                results.push({ lang, error: errorMessage });
                continue;
              }
              const payload = await response.json();
              results.push({ lang, ...payload });
            }
          } else if (isText) {
            const text = textInput.value.trim();
            if (!text) {
              setStatus(submitStatus, "Please enter text to translate.", true);
              submitBtn.disabled = false;
              return;
            }
            // For each language, send the text to /translate and then /tts
            for (const lang of selectedLanguages) {
              // 1. Translate
              let translated = null;
              let tts_url = null;
              let error = null;
              try {
                const resp = await fetch("/translate", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ text, target_language: lang }),
                });
                if (!resp.ok) {
                  let errorMessage = `Translation failed for ${lang}`;
                  try {
                    const payload = await resp.json();
                    errorMessage = payload.detail || errorMessage;
                  } catch (e) {
                    errorMessage = resp.statusText || errorMessage;
                  }
                  results.push({ lang, error: errorMessage });
                  continue;
                }
                const payload = await resp.json();
                translated = payload.translated_text || payload.text || "";
              } catch (e) {
                results.push({ lang, error: `Translation error: ${e.message}` });
                continue;
              }
              // 2. TTS
              try {
                const resp2 = await fetch("/tts", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ text: translated, target_language: lang }),
                });
                if (!resp2.ok) {
                  let errorMessage = `TTS failed for ${lang}`;
                  try {
                    const payload = await resp2.json();
                    errorMessage = payload.detail || errorMessage;
                  } catch (e) {
                    errorMessage = resp2.statusText || errorMessage;
                  }
                  results.push({ lang, translated, error: errorMessage });
                  continue;
                }
                const payload2 = await resp2.json();
                tts_url = payload2.tts_url;
                results.push({ lang, translated, tts_url });
              } catch (e) {
                results.push({ lang, translated, error: `TTS error: ${e.message}` });
              }
            }
          }

          // Show all results
          let output = "";
          let html = "";
          for (const r of results) {
            output += `Language: ${r.lang}\n`;
            html += `<div class='player' style='margin-bottom:18px;'>`;
            html += `<div style='font-weight:600;'>${r.lang}</div>`;
            if (r.error) {
              output += `  Error: ${r.error}\n\n`;
              html += `<div class='error'>${r.error}</div>`;
              html += `</div>`;
              continue;
            }
            if (r.translated) {
              output += `  Translated Text: ${r.translated}\n`;
              html += `<div style='margin:8px 0 8px 0;'><span style='font-weight:500;'>Text:</span> <span>${r.translated}</span></div>`;
            } else if (r.translation) {
              output += `  Translated Text: ${r.translation}\n`;
              html += `<div style='margin:8px 0 8px 0;'><span style='font-weight:500;'>Text:</span> <span>${r.translation}</span></div>`;
            } else if (r.text) {
              output += `  Text: ${r.text}\n`;
              html += `<div style='margin:8px 0 8px 0;'><span style='font-weight:500;'>Text:</span> <span>${r.text}</span></div>`;
            }
            if (r.tts_url) {
              output += `  Audio: ${r.tts_url}\n`;
              html += `<audio controls preload='none' src='${r.tts_url}' style='width:100%;margin-top:8px;'></audio>`;
            }
            html += `</div>`;
            output += "\n";
          }
          result.textContent = output;
          result.hidden = false;
          document.getElementById("multiResults").innerHTML = html;
          setStatus(submitStatus, "Done.");
        } catch (error) {
          setStatus(submitStatus, error.message || "Request failed", true);
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
