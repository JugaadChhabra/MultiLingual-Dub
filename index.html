<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" type="image/png" href="favicon.png"/>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AutoDub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f7f4ef;
        --ink: #1a1a1a;
        --accent: #0c6b5f;
        --muted: #6b6b6b;
      }

      body {
        margin: 0;
        font-family: "Poppins", "Helvetica Neue", Arial, sans-serif;
        background: radial-gradient(circle at 20% 10%, #f3eee6, #f7f4ef);
        color: var(--ink);
      }

      .wrap {
        max-width: 760px;
        margin: 40px auto;
        padding: 24px;
        background: #fffdf8;
        border: 1px solid #eee3d6;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: 0.4px;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
      }

      label {
        display: block;
        margin: 14px 0 6px;
        font-weight: 600;
      }

      input[type="file"],
      input[type="text"] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ddd3c7;
        background: #fff;
        font-size: 15px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .actions {
        margin-top: 18px;
        display: flex;
        gap: 12px;
        align-items: center;
      }

      button {
        border: none;
        background: var(--accent);
        color: #fff;
        padding: 12px 18px;
        font-size: 15px;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .status {
        margin-top: 16px;
        font-size: 14px;
      }

      .error {
        color: #a12a2a;
      }

      .result {
        margin-top: 18px;
        background: #faf6ef;
        border: 1px dashed #e2d7c9;
        padding: 12px;
        white-space: pre-wrap;
        font-size: 14px;
      }

      .player {
        margin-top: 16px;
        padding: 12px;
        border: 1px solid #e2d7c9;
        background: #fffaf2;
      }

      @media (max-width: 720px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Upload MP3</h1>
      <p>Select an mp3/script, pick the target language, and run the pipeline.</p>

      <form id="uploadForm">
        <label>Input Type</label>
        <div class="row">
          <div>
            <input type="radio" id="inputText" name="inputType" value="text" checked />
            <label for="inputText" style="display:inline;font-weight:400;">Paste Script</label>
          </div>
          <div>
            <input type="radio" id="inputAudio" name="inputType" value="audio" />
            <label for="inputAudio" style="display:inline;font-weight:400;">Upload MP3</label>
          </div>
        </div>

        <div id="audioInputSection" style="display:none;">
          <label for="audio">MP3 File</label>
          <input id="audio" name="audio" type="file" accept="audio/mpeg,.mp3" />
          <div class="status" id="fileStatus"></div>
        </div>

        <div id="textInputSection" style="display:block;">
          <label for="textInput">Text Input</label>
          <textarea id="textInput" name="textInput" rows="4" style="width:100%;padding:10px 12px;font-size:15px;"></textarea>
        </div>

        <div class="row">
          <div>
            <label>Target Languages</label>
            <div id="languageCheckboxes" style="display: flex; flex-wrap: wrap; gap: 10px 24px;">
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="bn-IN"> Bengali
              </label>
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="en-IN"> English
              </label>
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="gu-IN"> Gujarati
              </label>
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="hi-IN" checked> Hindi
              </label>
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="kn-IN"> Kannada
              </label>
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="ml-IN"> Malayalam
              </label>
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="mr-IN"> Marathi
              </label>
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="od-IN"> Odia
              </label>
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="pa-IN"> Punjabi
              </label>
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="ta-IN"> Tamil
              </label>
              <label style="display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" name="target_language" value="te-IN"> Telugu
              </label>
            </div>
          </div>
        </div>

        <div class="actions">
          <button id="submitBtn" type="submit">Run</button>
          <span class="status" id="submitStatus"></span>
        </div>
      </form>

      <div class="result" id="result" hidden></div>
      <div id="multiResults"></div>
    </div>

    <script>
      const form = document.getElementById("uploadForm");
      const audioInput = document.getElementById("audio");
      const fileStatus = document.getElementById("fileStatus");
      const submitStatus = document.getElementById("submitStatus");
      const result = document.getElementById("result");
      const player = document.getElementById("player");
      const audioPlayer = document.getElementById("audioPlayer");
      const submitBtn = document.getElementById("submitBtn");
      const inputAudioRadio = document.getElementById("inputAudio");
      const inputTextRadio = document.getElementById("inputText");
      const audioInputSection = document.getElementById("audioInputSection");
      const textInputSection = document.getElementById("textInputSection");
      const textInput = document.getElementById("textInput");

      function setStatus(el, message, isError = false) {
        el.textContent = message;
        el.className = "status" + (isError ? " error" : "");
      }

      function updateInputSections() {
        if (inputAudioRadio.checked) {
          audioInputSection.style.display = "block";
          textInputSection.style.display = "none";
        } else if (inputTextRadio.checked) {
          audioInputSection.style.display = "none";
          textInputSection.style.display = "block";
        }
      }
      inputAudioRadio.addEventListener("change", updateInputSections);
      inputTextRadio.addEventListener("change", updateInputSections);
      window.addEventListener("DOMContentLoaded", updateInputSections);

      audioInput.addEventListener("change", () => {
        const file = audioInput.files[0];
        result.hidden = true;
        if (!file) {
          setStatus(fileStatus, "");
          return;
        }
        if (!file.name.toLowerCase().endsWith(".mp3")) {
          setStatus(fileStatus, "Only .mp3 files are allowed.", true);
          audioInput.value = "";
          return;
        }
        const sizeMb = (file.size / (1024 * 1024)).toFixed(2);
        setStatus(fileStatus, `Selected: ${file.name} (${sizeMb} MB)`);
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        // Get selected languages from checkboxes
        const selectedLanguages = Array.from(document.querySelectorAll('input[name="target_language"]:checked')).map(cb => cb.value);
        if (selectedLanguages.length === 0) {
          setStatus(submitStatus, "Please select at least one target language.", true);
          return;
        }

        // Determine input type
        const isAudio = inputAudioRadio.checked;
        const isText = inputTextRadio.checked;

        submitBtn.disabled = true;
        setStatus(submitStatus, "Processing...");
        result.hidden = true;
        if (typeof player !== 'undefined' && player) player.hidden = true;
        if (typeof audioPlayer !== 'undefined' && audioPlayer) audioPlayer.removeAttribute("src");
        result.textContent = "";
        const multiResultsDiv = document.getElementById("multiResults");
        if (multiResultsDiv) multiResultsDiv.innerHTML = "";

        try {
          if (isText) {
            const text = textInput.value.trim();
            if (!text) {
              setStatus(submitStatus, "Please enter text to translate.", true);
              submitBtn.disabled = false;
              return;
            }
            // Send all selected languages to /translate at once
            const resp = await fetch("/translate", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ text, target_languages: selectedLanguages }),
            });
            if (!resp.ok) {
              let errorMessage = `Translation failed.`;
              try {
                const payload = await resp.json();
                errorMessage = payload.detail || errorMessage;
              } catch (e) {
                errorMessage = resp.statusText || errorMessage;
              }
              setStatus(submitStatus, errorMessage, true);
              submitBtn.disabled = false;
              return;
            }
            const payload = await resp.json();
            // Render editable fields for each translation
            let html = "";
            for (const lang of selectedLanguages) {
              const translation = payload.translations[lang] || "";
              html += `<div class='player' style='margin-bottom:18px;'>`;
              html += `<div style='font-weight:600;'>${lang}</div>`;
              html += `<textarea id="edit-translation-${lang}" rows="3" style="width:100%;margin:8px 0 8px 0;">${translation}</textarea>`;
              html += `<select id="voiceSelect-${lang}" name="voiceSelect-${lang}" style="margin-right:8px;padding:6px 10px;font-size:15px;">
                <option value="S1JBcZECEJJlf7lEDTbN">bhojpuri_ai_studio</option>
                <option value="dffT29nmBclERTsFHmHg">dv_nisha</option>
              </select>`;
              html += `<button type="button" onclick="ttsElevenLabs('${lang}')">Generate Audio (ElevenLabs)</button>`;
              html += `<span id="tts-status-${lang}" class="status"></span>`;
              html += `<audio id="audio-${lang}" controls style="display:none;width:100%;margin-top:8px;"></audio>`;
              html += `</div>`;
            }
                  // Generate audio using ElevenLabs endpoint
                  window.ttsElevenLabs = async function(lang) {
                    const textarea = document.getElementById(`edit-translation-${lang}`);
                    const statusSpan = document.getElementById(`tts-status-${lang}`);
                    const audioElem = document.getElementById(`audio-${lang}`);
                    const voiceSelect = document.getElementById(`voiceSelect-${lang}`);
                    if (!textarea || !voiceSelect) return;
                    const text = textarea.value.trim();
                    const voice_id = voiceSelect.value;
                    if (!text) {
                      statusSpan.textContent = "Text is empty.";
                      statusSpan.className = "status error";
                      return;
                    }
                    statusSpan.textContent = "Generating audio...";
                    statusSpan.className = "status";
                    try {
                      const resp = await fetch("/tts-elevenlabs", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ text, voice_id }),
                      });
                      if (!resp.ok) {
                        let errorMessage = `TTS failed for ${lang}`;
                        try {
                          const payload = await resp.json();
                          errorMessage = payload.detail || errorMessage;
                        } catch (e) {
                          errorMessage = resp.statusText || errorMessage;
                        }
                        statusSpan.textContent = errorMessage;
                        statusSpan.className = "status error";
                        return;
                      }
                      const payload = await resp.json();
                      if (payload.tts_url) {
                        audioElem.src = payload.tts_url;
                        audioElem.style.display = "block";
                        statusSpan.textContent = "Audio generated!";
                        statusSpan.className = "status";
                      } else {
                        statusSpan.textContent = "No audio URL returned.";
                        statusSpan.className = "status error";
                      }
                    } catch (e) {
                      statusSpan.textContent = `Error: ${e.message}`;
                      statusSpan.className = "status error";
                    }
                  }
            document.getElementById("multiResults").innerHTML = html;
            setStatus(submitStatus, "Translations ready. Edit and finalize as needed.");
          } else {
            setStatus(submitStatus, "Audio upload flow not implemented for new translation UI.", true);
          }
        } catch (error) {
          setStatus(submitStatus, error.message || "Request failed", true);
        } finally {
          submitBtn.disabled = false;
        }
      });

      // Finalize text for a language (send to backend for logging)
      window.finalizeText = async function(lang) {
        const textarea = document.getElementById(`edit-translation-${lang}`);
        const statusSpan = document.getElementById(`finalize-status-${lang}`);
        if (!textarea) return;
        const text = textarea.value.trim();
        if (!text) {
          statusSpan.textContent = "Text is empty.";
          statusSpan.className = "status error";
          return;
        }
        statusSpan.textContent = "Sending...";
        statusSpan.className = "status";
        try {
          const resp = await fetch("/finalize-text", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text, language: lang }),
          });
          if (!resp.ok) {
            let errorMessage = `Failed to finalize for ${lang}`;
            try {
              const payload = await resp.json();
              errorMessage = payload.detail || errorMessage;
            } catch (e) {
              errorMessage = resp.statusText || errorMessage;
            }
            statusSpan.textContent = errorMessage;
            statusSpan.className = "status error";
            return;
          }
          statusSpan.textContent = "Finalized and logged!";
          statusSpan.className = "status";
        } catch (e) {
          statusSpan.textContent = `Error: ${e.message}`;
          statusSpan.className = "status error";
        }
      }
    </script>
  </body>
</html>
