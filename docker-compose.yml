version: '3.8'

services:
  autodub:
    image: ghcr.io/jugaadchhabra/autodub:latest
    ports:
      - "8080:8080"
    volumes:
      # Mount directories for uploads and outputs
      - ./uploads:/app/uploads
      - ./output:/app/output
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      ISHWARI_VOICE_ID: ${ISHWARI_VOICE_ID}
      HEYGEN_ISHWARI: ${HEYGEN_ISHWARI}

      ELEVEN_LABS: ${ELEVEN_LABS}
      DESI_VOCAL_VOICE: ${DESI_VOCAL_VOICE}
      ENGLISH_VOICE: ${ENGLISH_VOICE}

      SARVAM_API: ${SARVAM_API}

      GEMINI_API_KEY: ${GEMINI_API_KEY}

      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      AWS_BUCKET: ${AWS_BUCKET}
      AWS_REGION: ${AWS_REGION}

      BATCH_ENABLE_S3_UPLOAD: ${BATCH_ENABLE_S3_UPLOAD:-true}
      BATCH_ENABLE_QC: ${BATCH_ENABLE_QC:-true}

      API_RETRY_MAX_ATTEMPTS: ${API_RETRY_MAX_ATTEMPTS:-20}
      API_RETRY_BASE_DELAY_S: ${API_RETRY_BASE_DELAY_S:-1.0}
      API_RETRY_MAX_DELAY_S: ${API_RETRY_MAX_DELAY_S:-60.0}

      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

# Usage:
# 1. docker pull ghcr.io/jugaadchhabra/autodub:latest
# 2. Create/edit .env and fill all required keys
# 3. docker compose up -d
# 4. Access at http://localhost:8080
