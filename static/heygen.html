<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ishwari Kumari Pipeline</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0d0f14;
        color: #e6e8ee;
        min-height: 100vh;
        padding: 40px 20px;
      }
      .wrap { max-width: 600px; margin: 0 auto; }

      .header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 28px;
      }
      .header-left h1 { font-size: 20px; margin: 0 0 4px; }
      .header-left p { color: #8b94a7; font-size: 13px; margin: 0; }
      .settings-btn {
        background: #1a1f2c;
        border: 1px solid #262b38;
        color: #8b94a7;
        padding: 7px 12px;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .settings-btn:hover { background: #1f2535; color: #e6e8ee; }

      form { display: grid; gap: 16px; }
      label { display: grid; gap: 6px; font-size: 13px; color: #b6bdcc; }

      textarea, input[type=text] {
        background: #161a23;
        border: 1px solid #262b38;
        color: #e6e8ee;
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        width: 100%;
      }
      textarea { resize: vertical; min-height: 80px; }
      input[type=file] { font-size: 13px; color: #b6bdcc; }

      .hint { color: #8b94a7; font-size: 12px; }

      .upload-area {
        border: 1.5px dashed #2a3040;
        border-radius: 10px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .upload-area:hover, .upload-area.dragover { border-color: #4f7cff; }
      .upload-area input[type=file] { display: none; }
      .upload-area .upload-label { font-size: 14px; color: #8b94a7; }
      .upload-area .upload-label strong { color: #4f7cff; }
      .upload-area .file-name { font-size: 13px; color: #6cd594; margin-top: 6px; }

      .generate-btn {
        background: #4f7cff;
        border: 0;
        color: white;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
      }
      .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .status {
        margin-top: 24px;
        padding: 14px 16px;
        background: #141823;
        border: 1px solid #232936;
        border-radius: 10px;
        font-size: 13px;
        line-height: 1.6;
      }
      .status.hidden { display: none; }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        background: #1f2533;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #8da2ff;
      }
      .badge.completed { background: #1d3a25; color: #6cd594; }
      .badge.failed { background: #3a1d1d; color: #ff8b8b; }
      pre {
        margin: 8px 0 0;
        background: #0a0c11;
        padding: 10px;
        border-radius: 6px;
        overflow: auto;
        font-size: 12px;
        color: #aab2c2;
      }
      video { width: 100%; margin-top: 14px; border-radius: 10px; background: black; }
      a { color: #8da2ff; }

      /* Settings modal */
      .modal-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      .modal-backdrop.open { display: flex; }
      .modal {
        background: #141823;
        border: 1px solid #262b38;
        border-radius: 12px;
        padding: 24px;
        width: 100%;
        max-width: 480px;
        margin: 20px;
      }
      .modal h2 { font-size: 16px; margin: 0 0 18px; }
      .modal-fields { display: grid; gap: 14px; }
      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 20px;
      }
      .btn-secondary {
        background: #1a1f2c;
        border: 1px solid #262b38;
        color: #b6bdcc;
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
      }
      .btn-save {
        background: #4f7cff;
        border: 0;
        color: white;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .saved-indicator {
        font-size: 12px;
        color: #6cd594;
        opacity: 0;
        transition: opacity 0.3s;
        align-self: center;
      }
      .saved-indicator.show { opacity: 1; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="header-left">
          <h1>Bhaktidhaam Content Pipeline</h1>
        </div>
        <button class="settings-btn" id="settingsBtn">⚙ Prompts</button>
      </div>

      <form id="form">
        <label>
          Reference image
          <div class="upload-area" id="uploadArea">
            <input type="file" name="image" id="imageInput" accept="image/png,image/jpeg,image/webp" required />
            <div class="upload-label"><strong>Choose file</strong> or drag here</div>
            <div class="file-name" id="fileName"></div>
          </div>
          <span class="hint">PNG, JPEG, or WebP. Crop to your target orientation first. Oldest avatar auto-removed if at the 3-photo cap.</span>
        </label>

        <label>
          Script
          <textarea name="script" rows="5" required placeholder="Type the line the avatar should speak…"></textarea>
        </label>

        <button type="submit" class="generate-btn" id="submitBtn">Generate video</button>
      </form>

      <div id="status" class="status hidden"></div>
    </div>

    <!-- Settings modal -->
    <div class="modal-backdrop" id="modalBackdrop">
      <div class="modal" id="modal">
        <h2>Prompt Settings</h2>
        <div class="modal-fields">
          <label>
            Video prompt <span class="hint">(how the video should look / feel)</span>
            <textarea id="settingsVideoPrompt" rows="3" placeholder="e.g. calm, slight head movement, soft natural expression"></textarea>
          </label>
          <label>
            Motion prompt <span class="hint">(optional, advanced)</span>
            <input type="text" id="settingsMotionPrompt" placeholder="[body part] + [action] + [emotion/intensity]" />
          </label>
        </div>
        <div class="modal-actions">
          <span class="saved-indicator" id="savedIndicator">Saved</span>
          <button class="btn-secondary" id="cancelBtn">Close</button>
          <button class="btn-save" id="saveSettingsBtn">Save</button>
        </div>
      </div>
    </div>

    <script>
      // --- Upload area ---
      const uploadArea = document.getElementById("uploadArea");
      const imageInput = document.getElementById("imageInput");
      const fileName = document.getElementById("fileName");

      uploadArea.addEventListener("click", (e) => { if (e.target !== imageInput) imageInput.click(); });
      uploadArea.addEventListener("dragover", (e) => { e.preventDefault(); uploadArea.classList.add("dragover"); });
      uploadArea.addEventListener("dragleave", () => uploadArea.classList.remove("dragover"));
      uploadArea.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadArea.classList.remove("dragover");
        const file = e.dataTransfer.files[0];
        if (file) {
          const dt = new DataTransfer();
          dt.items.add(file);
          imageInput.files = dt.files;
          fileName.textContent = file.name;
        }
      });
      imageInput.addEventListener("change", () => {
        fileName.textContent = imageInput.files[0] ? imageInput.files[0].name : "";
      });

      // --- Settings modal ---
      const SETTINGS_KEY = "heygen_prompt_settings";
      const DEFAULT_SETTINGS = {
        video_prompt: "The character is speaking directly to the camera in a calm, soothing, and divine tone, delivering an astrological and spiritual message as if guided by a higher power. Visuals: Soft cinematic lighting with a warm, divine glow on the face. Movements: Natural, graceful human-like head movements, including gentle nods of affirmation and subtle lateral head tilts. Expressions: A serene, compassionate, and divine smile with micro-expressions of wisdom. Eyes: Soft, warm, and prolonged eye contact with the camera, natural blinking, and occasional soft gaze shifts to avoid a dead stare. Lip-Sync & Jaw: Extremely accurate Hindi lip-sync with realistic mouth shape, jaw tension, and natural teeth visibility matching the phonemes. Body Language: Add a rhythmic, visible breathing pattern for a natural life-like presence, and incorporate slow, subtle, open-palm hand gestures to convey peace and avoid stiffness.",
        motion_prompt: "A serene spiritual guide delivering a divine message. Movement style: Graceful, slow, and highly empathetic. Maintain a gentle, compassionate smile throughout with micro-expressions of wisdom. Head movements should be fluid—incorporating soft lateral tilts, slow meditative nods of affirmation, and a subtle, rhythmic breathing pattern. Eyes should remain warm and focused on the camera with natural blinking and 'smiling eyes' (Duchenne smile). Mouth movements must be highly articulated for Hindi phonemes, showing realistic jaw tension and natural teeth visibility. Hands should move in a fluid, non-repetitive 'open-palm' gesture near the chest area to convey openness and peace. The overall presence should be calm, avoiding any sudden jerks, reflecting a meditative state of being.",
      };

      function loadSettings() {
        try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; } catch { return {}; }
      }
      function saveSettings(data) {
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(data));
      }
      function getEffectiveSettings() {
        const saved = loadSettings();
        return {
          video_prompt: saved.video_prompt ?? DEFAULT_SETTINGS.video_prompt,
          motion_prompt: saved.motion_prompt ?? DEFAULT_SETTINGS.motion_prompt,
        };
      }

      const modalBackdrop = document.getElementById("modalBackdrop");
      const settingsVideoPrompt = document.getElementById("settingsVideoPrompt");
      const settingsMotionPrompt = document.getElementById("settingsMotionPrompt");
      const savedIndicator = document.getElementById("savedIndicator");

      document.getElementById("settingsBtn").addEventListener("click", () => {
        const s = getEffectiveSettings();
        settingsVideoPrompt.value = s.video_prompt;
        settingsMotionPrompt.value = s.motion_prompt;
        modalBackdrop.classList.add("open");
      });

      function closeModal() { modalBackdrop.classList.remove("open"); }

      document.getElementById("cancelBtn").addEventListener("click", closeModal);
      modalBackdrop.addEventListener("click", (e) => { if (e.target === modalBackdrop) closeModal(); });
      document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

      document.getElementById("saveSettingsBtn").addEventListener("click", () => {
        saveSettings({
          video_prompt: settingsVideoPrompt.value.trim(),
          motion_prompt: settingsMotionPrompt.value.trim(),
        });
        savedIndicator.classList.add("show");
        setTimeout(() => savedIndicator.classList.remove("show"), 1500);
      });

      // --- Form submission ---
      const form = document.getElementById("form");
      const statusBox = document.getElementById("status");
      const submitBtn = document.getElementById("submitBtn");
      let pollTimer = null;

      function render(state) {
        statusBox.classList.remove("hidden");
        const s = state.status || "queued";
        const cls = s === "completed" ? "completed" : s === "failed" ? "failed" : "";
        const summary = state.summary || {};
        const localUrl = state.video_local_url;
        const remoteUrl = summary.video_url;
        const player = localUrl ? `<video src="${localUrl}" controls></video>` : "";
        const links = [
          localUrl ? `<a href="${localUrl}" download>download mp4</a>` : "",
          remoteUrl ? `<a href="${remoteUrl}" target="_blank">heygen url (7d)</a>` : "",
        ].filter(Boolean).join(" · ");

        statusBox.innerHTML = `
          <div><span class="badge ${cls}">${s}</span> ${state.stage_message || ""}</div>
          <div style="margin-top:8px;color:#8b94a7;">job: <code>${state.job_id}</code></div>
          ${state.error ? `<div style="color:#ff8b8b;margin-top:8px;">${state.error}</div>` : ""}
          ${links ? `<div style="margin-top:10px;">${links}</div>` : ""}
          ${player}
          <pre>${JSON.stringify(summary, null, 2)}</pre>
        `;
      }

      async function poll(jobId) {
        try {
          const res = await fetch(`/video/heygen/${jobId}`);
          if (!res.ok) throw new Error(`status ${res.status}`);
          const state = await res.json();
          render(state);
          if (state.status === "completed" || state.status === "failed") {
            clearInterval(pollTimer);
            submitBtn.disabled = false;
          }
        } catch (e) {
          statusBox.innerHTML = `<div style="color:#ff8b8b;">Polling error: ${e.message}</div>`;
        }
      }

      form.addEventListener("submit", async (ev) => {
        ev.preventDefault();
        submitBtn.disabled = true;
        statusBox.classList.remove("hidden");
        statusBox.innerHTML = `<div><span class="badge">submitting</span></div>`;

        const fd = new FormData(form);
        const s = getEffectiveSettings();
        if (s.video_prompt) fd.append("video_prompt", s.video_prompt);
        if (s.motion_prompt) fd.append("motion_prompt", s.motion_prompt);

        try {
          const res = await fetch("/video/heygen", { method: "POST", body: fd });
          if (!res.ok) {
            const text = await res.text();
            throw new Error(text || `HTTP ${res.status}`);
          }
          const data = await res.json();
          if (pollTimer) clearInterval(pollTimer);
          pollTimer = setInterval(() => poll(data.job_id), 4000);
          poll(data.job_id);
        } catch (e) {
          submitBtn.disabled = false;
          statusBox.innerHTML = `<div style="color:#ff8b8b;">${e.message}</div>`;
        }
      });
    </script>
  </body>
</html>
