<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ishwari Kumari Pipeline</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0d0f14;
        color: #e6e8ee;
        min-height: 100vh;
        padding: 40px 20px;
      }
      .wrap { max-width: 600px; margin: 0 auto; }

      .header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 20px;
      }
      .header-left h1 { font-size: 20px; margin: 0 0 4px; }
      .header-left p { color: #8b94a7; font-size: 13px; margin: 0; }
      .settings-btn {
        background: #1a1f2c;
        border: 1px solid #262b38;
        color: #8b94a7;
        padding: 7px 12px;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .settings-btn:hover { background: #1f2535; color: #e6e8ee; }

      /* Mode toggle */
      .mode-toggle {
        display: flex;
        background: #161a23;
        border: 1px solid #262b38;
        border-radius: 8px;
        padding: 3px;
        margin-bottom: 20px;
        width: fit-content;
      }
      .mode-btn {
        background: none;
        border: none;
        color: #8b94a7;
        padding: 6px 18px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.12s, color 0.12s;
      }
      .mode-btn.active {
        background: #4f7cff;
        color: #fff;
      }

      form { display: grid; gap: 16px; }
      label { display: grid; gap: 6px; font-size: 13px; color: #b6bdcc; }

      textarea, input[type=text] {
        background: #161a23;
        border: 1px solid #262b38;
        color: #e6e8ee;
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        width: 100%;
      }
      textarea { resize: vertical; min-height: 80px; }
      input[type=file] { font-size: 13px; color: #b6bdcc; }

      .hint { color: #8b94a7; font-size: 12px; }

      .upload-area {
        border: 1.5px dashed #2a3040;
        border-radius: 10px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .upload-area:hover, .upload-area.dragover { border-color: #4f7cff; }
      .upload-area input[type=file] { display: none; }
      .upload-area .upload-label { font-size: 14px; color: #8b94a7; }
      .upload-area .upload-label strong { color: #4f7cff; }
      .upload-area .file-name { font-size: 13px; color: #6cd594; margin-top: 6px; }

      .generate-btn {
        background: #4f7cff;
        border: 0;
        color: white;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
      }
      .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

      /* Status boxes */
      .status {
        margin-top: 24px;
        padding: 14px 16px;
        background: #141823;
        border: 1px solid #232936;
        border-radius: 10px;
        font-size: 13px;
        line-height: 1.6;
      }
      .status.hidden { display: none; }

      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        background: #1f2533;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #8da2ff;
      }
      .badge.completed { background: #1d3a25; color: #6cd594; }
      .badge.partial   { background: #3a2d1d; color: #ffb347; }
      .badge.failed    { background: #3a1d1d; color: #ff8b8b; }

      pre {
        margin: 8px 0 0;
        background: #0a0c11;
        padding: 10px;
        border-radius: 6px;
        overflow: auto;
        font-size: 12px;
        color: #aab2c2;
      }
      video { width: 100%; margin-top: 14px; border-radius: 10px; background: black; }
      a { color: #8da2ff; }

      /* Batch rows table */
      .batch-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
        font-size: 12px;
      }
      .batch-table th {
        text-align: left;
        color: #8b94a7;
        font-weight: 500;
        padding: 4px 8px 6px;
        border-bottom: 1px solid #232936;
      }
      .batch-table td {
        padding: 6px 8px;
        border-bottom: 1px solid #1a1f2c;
        vertical-align: middle;
      }
      .batch-table tr:last-child td { border-bottom: none; }
      .batch-table .title-cell { color: #c8d0df; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

      /* Settings modal */
      .modal-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      .modal-backdrop.open { display: flex; }
      .modal {
        background: #141823;
        border: 1px solid #262b38;
        border-radius: 12px;
        padding: 24px;
        width: 100%;
        max-width: 480px;
        margin: 20px;
      }
      .modal h2 { font-size: 16px; margin: 0 0 18px; }
      .modal-fields { display: grid; gap: 14px; }
      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 20px;
      }
      .btn-secondary {
        background: #1a1f2c;
        border: 1px solid #262b38;
        color: #b6bdcc;
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
      }
      .btn-save {
        background: #4f7cff;
        border: 0;
        color: white;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .saved-indicator {
        font-size: 12px;
        color: #6cd594;
        opacity: 0;
        transition: opacity 0.3s;
        align-self: center;
      }
      .saved-indicator.show { opacity: 1; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="header-left">
          <h1>Bhaktidhaam Content Pipeline</h1>
        </div>
        <button class="settings-btn" id="settingsBtn">⚙ Prompts</button>
      </div>

      <!-- Mode toggle -->
      <div class="mode-toggle">
        <button class="mode-btn active" id="modeSingle" type="button">Single</button>
        <button class="mode-btn" id="modeBatch" type="button">Batch</button>
      </div>

      <form id="form">
        <!-- Shared: image upload -->
        <label>
          Reference image
          <div class="upload-area" id="uploadArea">
            <input type="file" name="image" id="imageInput" accept="image/png,image/jpeg,image/webp" required />
            <div class="upload-label"><strong>Choose file</strong> or drag here</div>
            <div class="file-name" id="fileName"></div>
          </div>
          <span class="hint">PNG, JPEG, or WebP. Crop to your target orientation first. Oldest avatar auto-removed if at the 3-photo cap.</span>
        </label>

        <!-- Single mode: script -->
        <label id="scriptLabel">
          Script
          <textarea name="script" id="scriptInput" rows="5" required placeholder="Type the line the avatar should speak…"></textarea>
        </label>

        <!-- Batch mode: Excel upload -->
        <label id="excelLabel" style="display:none;">
          Scripts Excel
          <div class="upload-area" id="excelUploadArea">
            <input type="file" name="excel" id="excelInput" accept=".xlsx" />
            <div class="upload-label"><strong>Choose .xlsx file</strong> or drag here</div>
            <div class="file-name" id="excelFileName"></div>
          </div>
          <span class="hint">Required columns: <code>script</code>, <code>video_title</code> (optional). One row per video.</span>
        </label>

        <button type="submit" class="generate-btn" id="submitBtn">Generate video</button>
      </form>

      <div id="status" class="status hidden"></div>
      <div id="batchStatus" class="status hidden"></div>
    </div>

    <!-- Settings modal -->
    <div class="modal-backdrop" id="modalBackdrop">
      <div class="modal" id="modal">
        <h2>Prompt Settings</h2>
        <div class="modal-fields">
          <label>
            Video prompt <span class="hint">(how the video should look / feel)</span>
            <textarea id="settingsVideoPrompt" rows="3" placeholder="e.g. calm, slight head movement, soft natural expression"></textarea>
          </label>
          <label>
            Motion prompt <span class="hint">(optional, advanced)</span>
            <input type="text" id="settingsMotionPrompt" placeholder="[body part] + [action] + [emotion/intensity]" />
          </label>
        </div>
        <div class="modal-actions">
          <span class="saved-indicator" id="savedIndicator">Saved</span>
          <button class="btn-secondary" id="cancelBtn">Close</button>
          <button class="btn-save" id="saveSettingsBtn">Save</button>
        </div>
      </div>
    </div>

    <script>
      // --- Mode toggle ---
      let isBatch = false;
      const modeSingleBtn = document.getElementById("modeSingle");
      const modeBatchBtn = document.getElementById("modeBatch");
      const scriptLabel = document.getElementById("scriptLabel");
      const scriptInput = document.getElementById("scriptInput");
      const excelLabel = document.getElementById("excelLabel");
      const excelInput = document.getElementById("excelInput");
      const submitBtn = document.getElementById("submitBtn");
      const statusBox = document.getElementById("status");
      const batchStatusBox = document.getElementById("batchStatus");

      function setMode(batch) {
        isBatch = batch;
        modeSingleBtn.classList.toggle("active", !batch);
        modeBatchBtn.classList.toggle("active", batch);
        scriptLabel.style.display = batch ? "none" : "";
        excelLabel.style.display = batch ? "" : "none";
        scriptInput.required = !batch;
        excelInput.required = batch;
        submitBtn.textContent = batch ? "Generate batch" : "Generate video";
        statusBox.classList.add("hidden");
        batchStatusBox.classList.add("hidden");
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      }

      modeSingleBtn.addEventListener("click", () => setMode(false));
      modeBatchBtn.addEventListener("click", () => setMode(true));

      // --- Image upload area ---
      const uploadArea = document.getElementById("uploadArea");
      const imageInput = document.getElementById("imageInput");
      const fileName = document.getElementById("fileName");

      uploadArea.addEventListener("click", (e) => { if (e.target !== imageInput) imageInput.click(); });
      uploadArea.addEventListener("dragover", (e) => { e.preventDefault(); uploadArea.classList.add("dragover"); });
      uploadArea.addEventListener("dragleave", () => uploadArea.classList.remove("dragover"));
      uploadArea.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadArea.classList.remove("dragover");
        const file = e.dataTransfer.files[0];
        if (file) {
          const dt = new DataTransfer();
          dt.items.add(file);
          imageInput.files = dt.files;
          fileName.textContent = file.name;
        }
      });
      imageInput.addEventListener("change", () => {
        fileName.textContent = imageInput.files[0] ? imageInput.files[0].name : "";
      });

      // --- Excel upload area ---
      const excelUploadArea = document.getElementById("excelUploadArea");
      const excelFileName = document.getElementById("excelFileName");

      excelUploadArea.addEventListener("click", (e) => { if (e.target !== excelInput) excelInput.click(); });
      excelUploadArea.addEventListener("dragover", (e) => { e.preventDefault(); excelUploadArea.classList.add("dragover"); });
      excelUploadArea.addEventListener("dragleave", () => excelUploadArea.classList.remove("dragover"));
      excelUploadArea.addEventListener("drop", (e) => {
        e.preventDefault();
        excelUploadArea.classList.remove("dragover");
        const file = e.dataTransfer.files[0];
        if (file) {
          const dt = new DataTransfer();
          dt.items.add(file);
          excelInput.files = dt.files;
          excelFileName.textContent = file.name;
        }
      });
      excelInput.addEventListener("change", () => {
        excelFileName.textContent = excelInput.files[0] ? excelInput.files[0].name : "";
      });

      // --- Settings ---
      const SETTINGS_KEY = "heygen_prompt_settings";
      const DEFAULT_SETTINGS = {
        video_prompt: "calm, slight head movement, soft natural expression, devotional mood",
        motion_prompt: "",
      };

      function loadSettings() {
        try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; } catch { return {}; }
      }
      function saveSettings(data) {
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(data));
      }
      function getEffectiveSettings() {
        const saved = loadSettings();
        return {
          video_prompt: saved.video_prompt ?? DEFAULT_SETTINGS.video_prompt,
          motion_prompt: saved.motion_prompt ?? DEFAULT_SETTINGS.motion_prompt,
        };
      }

      const modalBackdrop = document.getElementById("modalBackdrop");
      const settingsVideoPrompt = document.getElementById("settingsVideoPrompt");
      const settingsMotionPrompt = document.getElementById("settingsMotionPrompt");
      const savedIndicator = document.getElementById("savedIndicator");

      document.getElementById("settingsBtn").addEventListener("click", () => {
        const s = getEffectiveSettings();
        settingsVideoPrompt.value = s.video_prompt;
        settingsMotionPrompt.value = s.motion_prompt;
        modalBackdrop.classList.add("open");
      });

      function closeModal() { modalBackdrop.classList.remove("open"); }
      document.getElementById("cancelBtn").addEventListener("click", closeModal);
      modalBackdrop.addEventListener("click", (e) => { if (e.target === modalBackdrop) closeModal(); });
      document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

      document.getElementById("saveSettingsBtn").addEventListener("click", () => {
        saveSettings({
          video_prompt: settingsVideoPrompt.value.trim(),
          motion_prompt: settingsMotionPrompt.value.trim(),
        });
        savedIndicator.classList.add("show");
        setTimeout(() => savedIndicator.classList.remove("show"), 1500);
      });

      // --- Single mode poll & render ---
      let pollTimer = null;

      function renderSingle(state) {
        statusBox.classList.remove("hidden");
        const s = state.status || "queued";
        const cls = s === "completed" ? "completed" : s === "failed" ? "failed" : "";
        const summary = state.summary || {};
        const localUrl = state.video_local_url;
        const remoteUrl = summary.video_url;
        const player = localUrl ? `<video src="${localUrl}" controls></video>` : "";
        const links = [
          localUrl ? `<a href="${localUrl}" download>download mp4</a>` : "",
          remoteUrl ? `<a href="${remoteUrl}" target="_blank">heygen url (7d)</a>` : "",
        ].filter(Boolean).join(" · ");

        statusBox.innerHTML = `
          <div><span class="badge ${cls}">${s}</span> ${state.stage_message || ""}</div>
          <div style="margin-top:8px;color:#8b94a7;">job: <code>${state.job_id}</code></div>
          ${state.error ? `<div style="color:#ff8b8b;margin-top:8px;">${state.error}</div>` : ""}
          ${links ? `<div style="margin-top:10px;">${links}</div>` : ""}
          ${player}
          <pre>${JSON.stringify(summary, null, 2)}</pre>
        `;
      }

      async function pollSingle(jobId) {
        try {
          const res = await fetch(`/video/heygen/${jobId}`);
          if (!res.ok) throw new Error(`status ${res.status}`);
          const state = await res.json();
          renderSingle(state);
          if (state.status === "completed" || state.status === "failed") {
            clearInterval(pollTimer);
            pollTimer = null;
            submitBtn.disabled = false;
          }
        } catch (e) {
          statusBox.innerHTML = `<div style="color:#ff8b8b;">Polling error: ${e.message}</div>`;
        }
      }

      // --- Batch mode poll & render ---
      const BATCH_STATUS_LABELS = { queued: "", running: "running", completed: "completed", partial: "partial", failed: "failed" };

      function badgeCls(s) {
        if (s === "completed") return "completed";
        if (s === "failed") return "failed";
        if (s === "partial") return "partial";
        return "";
      }

      function renderBatch(state) {
        batchStatusBox.classList.remove("hidden");
        const overall = state.status || "queued";
        const rowsHtml = (state.rows || []).map(row => {
          const s = row.status || "pending";
          const link = row.video_local_url
            ? `<a href="${row.video_local_url}" download>download</a>`
            : row.error ? `<span style="color:#ff8b8b;font-size:11px;">${row.error}</span>` : "—";
          return `<tr>
            <td style="color:#8b94a7;">${row.row_index}</td>
            <td class="title-cell">${row.video_title}</td>
            <td><span class="badge ${badgeCls(s)}">${s}</span></td>
            <td>${link}</td>
          </tr>`;
        }).join("");

        batchStatusBox.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div><span class="badge ${badgeCls(overall)}">${overall}</span> ${state.done}/${state.total} complete${state.failed_count ? ` · ${state.failed_count} failed` : ""}</div>
            <div style="color:#8b94a7;font-size:11px;">batch: <code>${state.batch_id}</code></div>
          </div>
          ${rowsHtml ? `<table class="batch-table" style="margin-top:12px;">
            <thead><tr><th>#</th><th>Title</th><th>Status</th><th>Download</th></tr></thead>
            <tbody>${rowsHtml}</tbody>
          </table>` : ""}
        `;
      }

      async function pollBatch(batchId) {
        try {
          const res = await fetch(`/video/heygen/batch/${batchId}`);
          if (!res.ok) throw new Error(`status ${res.status}`);
          const state = await res.json();
          renderBatch(state);
          const done = ["completed", "partial", "failed"].includes(state.status);
          if (done) {
            clearInterval(pollTimer);
            pollTimer = null;
            submitBtn.disabled = false;
          }
        } catch (e) {
          batchStatusBox.innerHTML = `<div style="color:#ff8b8b;">Polling error: ${e.message}</div>`;
        }
      }

      // --- Form submit ---
      const form = document.getElementById("form");

      form.addEventListener("submit", async (ev) => {
        ev.preventDefault();
        submitBtn.disabled = true;
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }

        const s = getEffectiveSettings();

        if (!isBatch) {
          // Single mode
          statusBox.classList.remove("hidden");
          statusBox.innerHTML = `<div><span class="badge">submitting</span></div>`;
          batchStatusBox.classList.add("hidden");

          const fd = new FormData(form);
          if (s.video_prompt) fd.append("video_prompt", s.video_prompt);
          if (s.motion_prompt) fd.append("motion_prompt", s.motion_prompt);

          try {
            const res = await fetch("/video/heygen", { method: "POST", body: fd });
            if (!res.ok) { const t = await res.text(); throw new Error(t || `HTTP ${res.status}`); }
            const data = await res.json();
            pollTimer = setInterval(() => pollSingle(data.job_id), 4000);
            pollSingle(data.job_id);
          } catch (e) {
            submitBtn.disabled = false;
            statusBox.innerHTML = `<div style="color:#ff8b8b;">${e.message}</div>`;
          }

        } else {
          // Batch mode
          batchStatusBox.classList.remove("hidden");
          batchStatusBox.innerHTML = `<div><span class="badge">submitting</span></div>`;
          statusBox.classList.add("hidden");

          if (!excelInput.files[0]) {
            batchStatusBox.innerHTML = `<div style="color:#ff8b8b;">Please select an Excel file.</div>`;
            submitBtn.disabled = false;
            return;
          }

          const fd = new FormData();
          fd.append("image", imageInput.files[0]);
          fd.append("excel", excelInput.files[0]);
          if (s.video_prompt) fd.append("video_prompt", s.video_prompt);
          if (s.motion_prompt) fd.append("motion_prompt", s.motion_prompt);

          try {
            const res = await fetch("/video/heygen/batch", { method: "POST", body: fd });
            if (!res.ok) { const t = await res.text(); throw new Error(t || `HTTP ${res.status}`); }
            const data = await res.json();
            pollTimer = setInterval(() => pollBatch(data.batch_id), 4000);
            pollBatch(data.batch_id);
          } catch (e) {
            submitBtn.disabled = false;
            batchStatusBox.innerHTML = `<div style="color:#ff8b8b;">${e.message}</div>`;
          }
        }
      });
    </script>
  </body>
</html>
